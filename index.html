const W=520, H=840;
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let DPR=Math.min(window.devicePixelRatio||1,2);
function resize(){
  const s=Math.min(innerWidth/W,(innerHeight)/H)*0.985;
  cv.style.width=(W*s)+'px'; cv.style.height=(H*s)+'px';
  cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener('resize',resize); resize();

/* ---------- input ---------- */
const keys={};
let tapped=false; // one-frame action flag (space / tap)
addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  keys[e.key]=true;
  if(e.key===' '||e.key==='Enter') tapped=true;
  if(e.key==='0' && scene.cheat) scene.cheat();  // hidden skip for testing
  music.ensure();
});
addEventListener('keyup',e=>{keys[e.key]=false;});
const touch={active:false,sx:0,sy:0,ax:0,ay:0,t0:0};
cv.addEventListener('pointerdown',e=>{
  const r=cv.getBoundingClientRect();
  touch.active=true; touch.sx=(e.clientX-r.left)/r.width*W; touch.sy=(e.clientY-r.top)/r.height*H;
  touch.px=touch.sx; touch.py=touch.sy; touch.ax=0; touch.ay=0; touch.t0=performance.now();
  music.ensure();
});
cv.addEventListener('pointermove',e=>{
  if(!touch.active)return;
  const r=cv.getBoundingClientRect();
  const x=(e.clientX-r.left)/r.width*W, y=(e.clientY-r.top)/r.height*H;
  touch.px=x; touch.py=y;
  touch.ax=Math.max(-1,Math.min(1,(x-touch.sx)/55));
  touch.ay=Math.max(-1,Math.min(1,(y-touch.sy)/55));
});
addEventListener('pointerup',e=>{
  if(touch.active && performance.now()-touch.t0<220 && Math.abs(touch.ax)<0.3 && Math.abs(touch.ay)<0.3){
    tapped=true;
    if(scene.onTap) scene.onTap(touch.px,touch.py);
  }
  touch.active=false; touch.ax=0; touch.ay=0;
});
function axisX(){ return (keys.ArrowLeft||keys.a?-1:0)+(keys.ArrowRight||keys.d?1:0)+touch.ax; }

const music={
  ac:null,on:true,mode:'menu',next:0,bar:0,gain:null,
  ensure(){ if(!this.ac){ this.ac=new (window.AudioContext||window.webkitAudioContext)();
      this.gain=this.ac.createGain(); this.gain.gain.value=0.5; this.gain.connect(this.ac.destination);
      this.next=this.ac.currentTime+0.05; }
    if(this.ac.state==='suspended') this.ac.resume(); },
  osc(type,f0,t,dur,vol,f1,fltF){ const ac=this.ac;
    const o=ac.createOscillator(),g=ac.createGain();
    o.type=type; o.frequency.setValueAtTime(f0,t);
    if(f1) o.frequency.exponentialRampToValueAtTime(f1,t+dur);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    let node=g;
    if(fltF){ const fl=ac.createBiquadFilter(); fl.type='lowpass'; fl.frequency.value=fltF; g.connect(fl); node=fl; }
    o.connect(g); node.connect(this.gain); o.start(t); o.stop(t+dur+0.02); },
  noise(t,dur,vol,hp){ const ac=this.ac, n=ac.sampleRate*dur, buf=ac.createBuffer(1,n,ac.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<n;i++)d[i]=Math.random()*2-1;
    const src=ac.createBufferSource(); src.buffer=buf;
    const g=ac.createGain(); g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    const f=ac.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp||6000;
    src.connect(f); f.connect(g); g.connect(this.gain); src.start(t); },
  kick(t){ this.osc('sine',150,t,0.28,0.9,40); },
  snare(t){ this.noise(t,0.14,0.5,2500); this.osc('triangle',190,t,0.09,0.3,120); },
  hat(t,open){ this.noise(t,open?0.18:0.05,open?0.22:0.18,8000); },
  bass(t,f,d){ this.osc('sawtooth',f,t,d,0.45,undefined,300); this.osc('sine',f/2,t,d,0.5); },
  whistle(t,f,d,f1){ this.osc('sine',f,t,d,0.16,f1||f); },
  scheduleBar(t,drive){
    const bt=drive?60/96:60/82, N=[41.2,49,55,61.74,73.42]; // E1 G1 A1 B1 D2
    // kicks
    [0,0.75,2,2.75,4,4.75,6,6.5,7.5].forEach(b=>this.kick(t+b*bt));
    [1,3,5,7].forEach(b=>this.snare(t+b*bt));
    for(let i=0;i<16;i++) this.hat(t+i*0.5*bt, drive&&(i===7||i===15));
    // bass line (original hook, dirty-south minor)
    const line=[[0,0,1.5],[0.75,0,0.5],[2,1,0.75],[2.75,0,0.75],[4,0,1.5],[4.75,3,0.5],[6,2,0.75],[6.75,4,0.5],[7.5,0,0.5]];
    line.forEach(([b,n,d])=>this.bass(t+b*bt,N[n]*2,d*bt));
    // whistle hook every other bar
    if(this.bar%2===0 && drive){
      const w=[[0.0,880,0.4,660],[0.75,660,0.3],[1.5,740,0.3],[2.25,880,0.7,880],[4,660,0.35],[4.75,740,0.35],[5.5,880,0.9,590]];
      w.forEach(([b,f,d,f1])=>this.whistle(t+b*bt,f,d*bt*2,f1));
    }
    return 8*bt;
  },
  customBuf:null,customSrc:null,
  playCustom(){ if(!this.customBuf)return; this.stopCustom();
    const s=this.ac.createBufferSource(); s.buffer=this.customBuf; s.loop=true;
    const g=this.ac.createGain(); g.gain.value=0.8; s.connect(g); g.connect(this.gain);
    s.start(); this.customSrc=s; },
  stopCustom(){ if(this.customSrc){ try{this.customSrc.stop();}catch(e){} this.customSrc=null; } },
  update(){ if(!this.ac||!this.on)return;
    if(this.customBuf){ this.next=this.ac.currentTime+0.1; return; } // user's own song replaces the beat
    while(this.next<this.ac.currentTime+0.35){
      this.next+=this.scheduleBar(this.next,this.mode==='drive'); this.bar++;
    } },
  sfx(name){ if(!this.ac||!this.on)return; const t=this.ac.currentTime;
    if(name==='blip')this.osc('square',700,t,0.07,0.15,900);
    if(name==='good'){this.osc('sine',660,t,0.1,0.25);this.osc('sine',880,t+0.09,0.14,0.25);}
    if(name==='bad'){this.osc('sawtooth',200,t,0.25,0.3,80);}
    if(name==='win'){[523,659,784,1047].forEach((f,i)=>this.osc('sine',f,t+i*0.11,0.3,0.3));}
    if(name==='crash'){this.noise(t,0.3,0.6,1000);this.osc('sawtooth',120,t,0.3,0.4,50);}
    if(name==='meow'){this.osc('sine',900,t,0.3,0.2,500);}
    if(name==='cash'){this.osc('square',1200,t,0.06,0.2);this.osc('square',1600,t+0.07,0.08,0.2);}
  }
};

function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function txt(s,x,y,size,color,align,weight,ls){
  ctx.fillStyle=color||C.cream; ctx.textAlign=align||'center'; ctx.textBaseline='middle';
  ctx.font=(weight||400)+' '+size+'px -apple-system,"Segoe UI",Arial,sans-serif';
  if(ls){ctx.save();ctx.translate(x,y);ctx.fillText(s,0,0);ctx.restore();} else ctx.fillText(s,x,y);
}
function display(s,x,y,size,color){ // heavy display type

function drawRenzer(x,y,r,ang){
  ctx.save(); ctx.translate(x,y); if(ang)ctx.rotate(ang);
  if(faceImg&&faceImg.complete&&faceImg.naturalWidth){
    ctx.beginPath();ctx.arc(0,0,r,0,7);ctx.closePath();ctx.save();ctx.clip();
    // pre-cropped square face (cap + shades), centered
    const s=r*2.2; ctx.drawImage(faceImg,-s/2,-s/2,s,s); ctx.restore();
    ctx.lineWidth=2;ctx.strokeStyle=C.gold;ctx.stroke(); ctx.restore(); return;
  }
  // skin
  ctx.beginPath();ctx.arc(0,r*0.08,r*0.92,0,7);ctx.fillStyle='#d9a06b';ctx.fill();

  ctx.beginPath();ctx.arc(0,r*0.38,r*0.78,0.15*Math.PI,0.85*Math.PI);ctx.fillStyle='#3a2a1c';ctx.fill();
  ctx.beginPath();ctx.ellipse(0,r*0.52,r*0.34,r*0.16,0,0,7);ctx.fillStyle='#d9a06b';ctx.fill(); // mouth gap
  // cap (tan trucker)

  ctx.fillStyle='#cbb28c';ctx.fillRect(-r*0.94,-r*0.28,r*1.88,r*0.22);

  ctx.beginPath();ctx.ellipse(r*0.1,-r*0.06,r*0.95,r*0.2,0,0,Math.PI,false);
  ctx.fillStyle='#b89b74';ctx.fill();
  // shades
  rr(-r*0.72,-r*0.06,r*0.62,r*0.4,r*0.12);ctx.fillStyle='#191622';ctx.fill();
  rr(r*0.1,-r*0.06,r*0.62,r*0.4,r*0.12);ctx.fill();

  ctx.restore();
}

    this.targets.forEach(t=>{

      txt(t.icon,t.x,t.y-6,30);

    });
    drawDog(60,700,16);

    // girl
    const g=this.girl;

    drawRenzer(this.px,this.py,24);

    txt('גניבות: '+this.steals+' / 3',W-110,750,15,this.steals?C.mag:C.dim,'center',700);

/* ---------- DRIVE ---------- */
function makeDriveScene(city,startDist){
 return {
  cheat(){ this.dist=1; },
  init(){
    music.mode='drive';
    this.x=W/2; this.y=H-170; this.dist=startDist||0; this.speed=1; this.cars=[]; this.spawn=0;
    this.crash=0; this.t=0; this.dur=20+Math.random()*4; this.crashLine='';
    this.shopAt=S.condoms?99:0.45+Math.random()*0.15; this.stopping=false; this.stopT=0;
  },
  update(dt){
    this.t+=dt;
    if(this.stopping){ // mandatory pharmacy pull-over: controls off, car slides to the shoulder
      this.speed=Math.max(0.1,this.speed-dt*1.1);
      this.x+=((W-125)-this.x)*Math.min(1,dt*2.5);
      this.cars.forEach(c=>{c.y+=(c.v*this.speed+120)*dt;});
      this.stopT+=dt;
      if(this.stopT>1.5) setScene(pharmScene(city,this.dist));
      return;
    }
    const sp=300*this.speed;
    this.x=Math.max(95,Math.min(W-95,this.x+clampAx(axisX())*sp*dt));
    this.y=Math.max(430,Math.min(H-100,this.y+clampAx(axisY())*sp*dt*0.7));
    if(this.crash>0){this.crash-=dt; this.speed=0.45;}
    else this.speed=Math.min(1,this.speed+dt*0.8);
    this.dist+=dt/this.dur*this.speed;
    this.spawn-=dt;
    if(this.spawn<=0){
      this.spawn=0.55+Math.random()*0.5;
      const lane=[130,220,310,400][Math.floor(Math.random()*4)];
      const r=Math.random();
      this.cars.push({x:lane,y:-80,v:220+Math.random()*120,
        type:r<0.12?'camel':(r<0.3?'truck':'car'),
        col:['#3b6fd9','#d9d9d9','#54b06a','#c9a23b','#8a55c9'][Math.floor(Math.random()*5)]});
    }
    this.cars.forEach(c=>{ c.y+=(c.v*this.speed+120)*dt; if(c.type==='camel')c.x+=30*dt; });
    this.cars=this.cars.filter(c=>c.y<H+100);
    // mandatory pharmacy stop, once per game
    if(!S.condoms && this.dist>this.shopAt){ this.stopping=true; music.sfx('blip'); }
    // collision
    if(this.crash<=0) this.cars.forEach(c=>{
      const w=c.type==='truck'?34:26, h=c.type==='truck'?60:42;
      if(Math.abs(c.x-this.x)<w&&Math.abs(c.y-this.y)<h+20){
        this.crash=1.2; music.sfx('crash');
        this.crashLine=['נו באמת, האלפא!! 😫','יופי איטלקי, אמינות איטלקית 🇮🇹','האלפא עושה רעש מוזר. שוב.','זו לא מכה, זה קרקטר.'][Math.floor(Math.random()*4)];
      }
    });
    if(this.dist>=1){
      music.sfx('win');
      setScene(makeInfoScene(city,MINIGAMES[city.id]));
    }
  },
  draw(){
    // desert sides
    ctx.fillStyle='#312a1e';ctx.fillRect(0,0,W,H);
    for(let i=0;i<8;i++){const yy=((i*130+this.t*260*this.speed)%(H+140))-70;
      txt('🌴',48,yy,26);txt('🌵',W-44,(yy+230)%(H+140)-70,22);}
    // road
    ctx.fillStyle=C.road;ctx.fillRect(85,0,W-170,H);
    ctx.strokeStyle='#f0e6d4';ctx.lineWidth=3;
    ctx.strokeRect(85,-4,0.001,H+8);
    ctx.beginPath();ctx.moveTo(85,0);ctx.lineTo(85,H);ctx.moveTo(W-85,0);ctx.lineTo(W-85,H);ctx.stroke();
    ctx.setLineDash([30,26]);ctx.lineDashOffset=-(this.t*380*this.speed)%56;
    ctx.strokeStyle='#f5c54288';
    [175,265,355].forEach(x=>{ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();});
    ctx.setLineDash([]);
    // traffic
    this.cars.forEach(c=>{
      if(c.type==='camel'){ txt('🐪',c.x,c.y,40); return; }
      ctx.save();ctx.translate(c.x,c.y);ctx.rotate(Math.PI);
      const s=c.type==='truck'?1.3:0.9;ctx.scale(s,s);
      rr(-18,-36,36,72,10);ctx.fillStyle=c.col;ctx.fill();ctx.strokeStyle='#0006';ctx.stroke();
      rr(-13,-12,26,26,6);ctx.fillStyle='#1c1826';ctx.fill();
      ctx.restore();
    });
    // pharmacy pull-over
    if(this.stopping){
      const sy=-140+this.stopT*430;
      rr(W-165,sy-54,125,108,10);ctx.fillStyle='#e8f2ee';ctx.fill();
      ctx.strokeStyle='#2f7a5f';ctx.lineWidth=2;ctx.stroke();
      txt('🏪',W-102,sy-16,30);
      ctx.fillStyle='#2f7a5f';rr(W-157,sy+14,109,28,6);ctx.fill();
      ctx.direction='rtl';txt('סופר-פארם',W-102,sy+28,12,'#fff','center',800);ctx.direction='ltr';
    }
    // player
    if(this.crash>0&&Math.floor(this.t*12)%2===0){} else {
      drawAlfa(this.x,this.y,1,Math.sin(this.t*2)*0.01);
      drawRenzer(this.x-1,this.y-10,9);
      drawDog(this.x+10,this.y+14,7);
    }
    if(this.crash>0){ctx.direction='rtl';txt(this.crashLine,this.x,this.y-70,15,C.mag,'center',700);ctx.direction='ltr';}
    if(this.stopping){ctx.direction='rtl';txt('רגע רגע רגע... סופר-פארם!! 😳',W/2,360,20,C.gold,'center',800);ctx.direction='ltr';}
    // progress
    rr(85,H-46,W-170,16,8);ctx.fillStyle='#1a1430';ctx.fill();
    rr(85,H-46,(W-170)*Math.min(1,this.dist),16,8);ctx.fillStyle=C.cyan;ctx.fill();
    ctx.direction='rtl';
    txt('בדרך ל'+city.name+' ('+city.id+') 🚗💨',W/2,H-66,15,C.cream,'center',700);
    ctx.direction='ltr';
    hud();
  }
 };
}

    setScene(makeWinScene(city,'היא שילמה גם על הקינוח. וגם על החניה.','03 — היא שילמה!')); },
  update(dt){
    this.t+=dt;
    if(this.over){ if(tapped)this.init(); return; }
    this.m+=this.mdir*this.mspeed*dt;
    if(this.m>1){this.m=1;this.mdir=-1;} if(this.m<-1){this.m=-1;this.mdir=1;}
    this.b-=dt*0.03; // she keeps sliding it back
    if(tapped){
      if(Math.abs(this.m)<this.zone){
        this.hits++; this.b+=0.28; this.mspeed+=0.18; this.zone=Math.max(0.18,this.zone-0.012);
        music.sfx('good');
        this.msg=['"אני על מלגה, אין מצב"','"רגע, הקוד שלי עוד רץ"','"יש לי הגשה בחצות"','"אולי חצי-חצי? O(n/2)?"','"אוקיי אוקיי אני משלמת!!"'][Math.min(this.hits-1,4)];
        this.msgT=1.6;
        if(this.hits>=this.need){ this.win(); return; } // win by successful pushes, not only bill position
      } else {
        this.b-=0.10; music.sfx('bad');
        this.msg='"אתה בטוח שאתה לא רוצה לחלוק?" 😏'; this.msgT=1.4;
      }
    }
    if(this.msgT>0)this.msgT-=dt;
    if(this.b>=1) this.win();
    if(this.b<=-1){ this.over=1; music.sfx('crash'); }
  },
  draw(){
    ctx.fillStyle='#1f1a33';ctx.fillRect(0,0,W,H);
    ctx.direction='rtl';txt('בית קפה בדיזנגוף · 03',W/2,90,16,C.cyan,'center',700);ctx.direction='ltr';
    // table
    ctx.fillStyle='#4a3626';rr(60,430,W-120,190,20);ctx.fill();
    ctx.fillStyle='#5a4430';rr(60,430,W-120,26,13);ctx.fill();
    txt('☕',150,500,26);txt('🥐',330,505,24);txt('🍰',380,495,22);
    // characters
    drawGirl(W-130,300,46,{hair:'#2b1d12',acc:'💻'});
    drawRenzer(130,300,46);
    if(this.msgT>0) bubble(W-140,220,250,this.msg,'right');
    // the bill slides on a rail
    const bx=W/2+this.b*160;
    ctx.strokeStyle='#00000033';ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(W/2-165,545);ctx.lineTo(W/2+165,545);ctx.stroke();
    ctx.save();ctx.translate(bx,540);ctx.rotate(Math.sin(this.t*3)*0.05);
    rr(-26,-34,52,68,6);ctx.fillStyle='#fdf8ec';ctx.fill();ctx.strokeStyle='#b7a67e';ctx.stroke();
    txt('חשבון',0,-14,11,'#6a5a3a');txt('₪247',0,8,15,'#2c2438','center',800);
    ctx.restore();
    ctx.direction='rtl';
    txt('← לדחוף אליה',W/2+120,585,12,C.green);
    txt('אליך = אסון →',W/2-120,585,12,C.mag);
    ctx.direction='ltr';
    // timing bar
    rr(70,660,W-140,54,14);ctx.fillStyle='#141022';ctx.fill();ctx.strokeStyle=C.line;ctx.stroke();
    const zc=W/2, zw=(W-160)/2*this.zone*2;
    ctx.fillStyle='#5fd97a55';ctx.fillRect(zc-zw/2,664,zw,46);
    ctx.fillStyle=C.green;ctx.fillRect(zc-1.5,660,3,54);
    const mx=W/2+this.m*(W-170)/2;
    ctx.fillStyle=C.gold;rr(mx-5,656,10,62,5);ctx.fill();
    ctx.direction='rtl';
    txt('SPACE/טאץ׳ כשהפס בירוק — דוחף לה את החשבון ('+this.hits+'/'+this.need+')',W/2,745,13,C.cream);
    txt('היא מחזירה אותו כל הזמן. אל תיתן לו להגיע אליך.',W/2,770,12,C.dim);
    ctx.direction='ltr';
    if(this.over) bigBanner('GAME OVER','החשבון הגיע אליך. יש לך רק $5!','SPACE / טאץ׳ — סיבוב שני, הפעם בביטחון');
    hud();
  }
 };
}
/* ---------- MINIGAME 09: NETANYA — catch the food ---------- */
function netanyaScene(city){
 return {
  cheat(){this.win();},
  init(){ this.px=W/2; this.items=[]; this.spawn=0; this.score=0; this.strikes=0; this.t=0; this.over=0;
    this.msg='שב שב חמוד, אני זורקת לך מהמנגל 🔥'; this.msgT=2.5; },
  win(){ city.done=true; S.foodEaten+=10; music.sfx('win');
    setScene(makeWinScene(city,'אכלת בחינם עד שהתעייפת. היא ארזה לך גם הביתה.','09 — האכילה אותך!')); },
  update(dt){
    this.t+=dt;
    if(this.over){ if(tapped)this.init(); return; }
    this.px=Math.max(60,Math.min(W-60,this.px+clampAx(axisX())*420*dt));
    this.spawn-=dt;
    if(this.spawn<=0){
      this.spawn=0.58+Math.random()*0.4;
      const bad=Math.random()<0.24;
      this.items.push({x:80+Math.random()*(W-160),y:190,v:190+Math.random()*105+this.t*4,
        icon:bad?(Math.random()<0.5?'💸':'🥗'):['🍗','🥙','🍉','🍕','🌽'][Math.floor(Math.random()*5)],bad});
    }
    this.items.forEach(it=>it.y+=it.v*dt);
    this.items=this.items.filter(it=>{
      if(it.y>H-140&&it.y<H-90&&Math.abs(it.x-this.px)<58){
        if(it.bad){ this.strikes++; music.sfx('bad'); this.msg=it.icon==='💸'?'זה היה חשבון!! עזוב!!':'טבעוני?! רנצר לא נוגע.'; this.msgT=1.4; }
        else { this.score++; music.sfx('blip'); }
        return false;
      }
      if(it.y>H-40){ if(!it.bad){this.strikes++;music.sfx('bad');this.msg='פספסת שיפוד! חוצפה.';this.msgT=1.2;} return false; }
      return true;
    });
    if(this.msgT>0)this.msgT-=dt;
    if(this.score>=10) this.win();
    if(this.strikes>=3){ this.over=1; music.sfx('crash'); }
  },
  draw(){
    ctx.fillStyle='#231a30';ctx.fillRect(0,0,W,H);

    drawGirl(W/2,150,38,{hair:'#c9812a',acc:'🍢'});

    if(this.msgT>0) bubble(W/2,95,270,this.msg);
    // items
    this.items.forEach(it=>txt(it.icon,it.x,it.y,30));
    // renzer with plate
    drawRenzer(this.px,H-95,30);
    ctx.fillStyle='#e8e0cc';ctx.beginPath();ctx.ellipse(this.px,H-125,55,10,0,0,7);ctx.fill();
    ctx.strokeStyle='#b7a67e';ctx.stroke();
    // score
    ctx.direction='rtl';
    txt('נאכל: '+this.score+' / 10',100,240,15,C.gold,'center',700);
    txt('פשלות: '+this.strikes+' / 3',W-100,240,15,this.strikes?C.mag:C.dim,'center',700);
    txt('חיצים/גרירה — לתפוס אוכל. בלי חשבונות. בלי טבעוני.',W/2,H-28,12,C.dim);
    ctx.direction='ltr';
    if(this.over) bigBanner('רעב נשארת','שלוש פשלות. המנגל נכבה.','SPACE / טאץ׳ — עוד סיבוב');
    hud();
  }
 };
}
/* ---------- MINIGAME 08: BEER SHEVA — red light green light weed ---------- */
function bshevaScene(city){
 return {
  cheat(){this.win();},
  init(){ this.px=W/2; this.py=740; this.caught=0; this.state='green'; this.timer=1.6; this.warn=0;
    this.t=0; this.over=0; this.msg='אם היא רואה אותך זז — נשרפת. 🌿'; this.msgT=2.4; this.got=false; },
  win(){ city.done=true; S.weed=true; music.sfx('win');
    setScene(makeWinScene(city,'סטלה אמרה שאתה "בחור עם ידיים שקטות" ונתנה שקית מלאה.','08 — יש ירוק!')); },
  update(dt){
    this.t+=dt;
    if(this.over){ if(tapped)this.init(); return; }
    this.timer-=dt;
    if(this.timer<=0){
      if(this.state==='green'){ this.state='warn'; this.timer=0.45; music.sfx('blip'); }
      else if(this.state==='warn'){ this.state='red'; this.timer=0.9+Math.random()*0.9; }
      else { this.state='green'; this.timer=1.1+Math.random()*1.4; }
    }
    const mx=clampAx(axisX()), my=clampAx(axisY());
    const moving=Math.abs(mx)>0.15||Math.abs(my)>0.15;
    if(moving){
      this.px=Math.max(50,Math.min(W-50,this.px+mx*230*dt));
      this.py=Math.max(210,Math.min(770,this.py+my*230*dt));
      if(this.state==='red'){
        this.caught++; music.sfx('bad');
        this.msg=['"רגע... מי אתה בכלל?!"','"עוד פעם ראיתי אותך!"','"די נו, אחרון!"'][Math.min(this.caught-1,2)];
        this.msgT=1.6; this.px=W/2; this.py=740;
        if(this.caught>=3){ this.over=1; music.sfx('crash'); }
      }
    }
    // reach the jar
    if(!this.got && Math.hypot(this.px-95,this.py-235)<46){ this.got=true; music.sfx('cash');
      this.msg='יש! עכשיו תחזור לדלת בשקט... 🤫'; this.msgT=2; }
    if(this.got && this.py>735 && Math.abs(this.px-W/2)<70) this.win();
    if(this.msgT>0)this.msgT-=dt;
  },
  draw(){
    ctx.fillStyle='#1c2418';ctx.fillRect(0,0,W,H);
    ctx.direction='rtl';txt('החממה של סטלה · באר שבע · 08',W/2,90,16,C.cyan,'center',700);ctx.direction='ltr';
    // plants
    for(let i=0;i<10;i++) txt('🪴',65+(i%5)*95,320+Math.floor(i/5)*280,30);
    for(let i=0;i<6;i++) txt('🌿',110+(i%3)*140,460+Math.floor(i/3)*140,26);
    // jar
    if(!this.got){ rr(65,205,60,60,10);ctx.fillStyle='#332a20';ctx.fill();ctx.strokeStyle=C.gold;ctx.stroke();
      txt('🫙',95,232,30); ctx.direction='rtl';txt('הסטאש',95,278,11,C.gold);ctx.direction='ltr'; }
    // door
    rr(W/2-60,800,120,40,8);ctx.fillStyle='#5a4030';ctx.fill();
    ctx.direction='rtl';txt('יציאה',W/2,820,12,'#cbb28c');ctx.direction='ltr';
    // stella
    const facing=this.state==='red';
    drawGirl(W-100,235,34,{hair:'#3a7a3a',acc:facing?'👀':'🚿'});
    if(!facing){ // back turned: hair overlay
      ctx.fillStyle='#3a7a3a';ctx.beginPath();ctx.arc(W-100,240,30,0,7);ctx.fill();
      txt('🚿',W-58,205,24);
    }
    // light state
    const col=this.state==='green'?C.green:(this.state==='warn'?C.gold:C.red);
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(W/2,140,14,0,7);ctx.fill();
    ctx.direction='rtl';
    txt(this.state==='green'?'היא משקה — זוז!':(this.state==='warn'?'רגע... היא מסתובבת!':'קפוא!! 🥶'),W/2,175,15,col,'center',800);
    ctx.direction='ltr';
    drawRenzer(this.px,this.py,26);
    if(this.got) txt('🫙',this.px+26,this.py-24,22);
    if(this.msgT>0) bubble(W-110,160,240,this.msg,'right');
    ctx.direction='rtl';
    txt('נתפסת: '+this.caught+' / 3',W-100,780,14,this.caught?C.mag:C.dim,'center',700);
    if(this.got) txt('עכשיו לדלת! ⬇',100,780,14,C.gold,'center',700);
    ctx.direction='ltr';
    if(this.state==='red'){ctx.fillStyle='#e8503f14';ctx.fillRect(0,0,W,H);}
    if(this.over) bigBanner('נתפסת','סטלה החרימה לך גם את החצי ג׳וינט. אאוץ׳.','SPACE / טאץ׳ — נסיון נוסף');
    hud();
  }
 };
}
/* ---------- MINIGAME 02: JERUSALEM — יורדים בגדול ---------- */
function jlmScene(city){
 const WALLS=[
   [40,260,440,16],[40,260,16,520],[464,260,16,420],[40,764,300,16],
   [120,340,16,120],[120,444,200,16],[200,340,180,16],[380,260,16,120],
   [40,540,220,16],[336,444,16,180],[200,540,16,160],[260,608,140,16],
   [120,684,160,16],[400,540,80,16],[336,680,144,16]
 ];
 return {
  cheat(){this.win();},
  init(){ this.px=70;this.py=730; this.regret=0; this.t=0; this.over=0;
    this.cats=[{x:300,y:390,d:1,axis:'x',min:230,max:360},{x:290,y:660,d:1,axis:'y',min:580,max:740},{x:420,y:330,d:1,axis:'y',min:290,max:420}];
    this.msg='"בוא כבר חמודדדד, רק תיזהר מהחתולים"'; this.msgT=3; },
  win(){ city.done=true; music.sfx('win');
    setScene(makeWinScene(city,'ירדת בגדול. פנינה הכינה לך טוסט אחרי. אגדה מהלכת.','02 — ירדת בגדול!')); },
  hit(x,y,r){ return WALLS.some(([wx,wy,ww,wh])=>x+r>wx&&x-r<wx+ww&&y+r>wy&&y-r<wy+wh); },
  update(dt){
    this.t+=dt;
    if(this.over){ if(tapped)this.init(); return; }
    const nx=this.px+clampAx(axisX())*200*dt, ny=this.py+clampAx(axisY())*200*dt;
    if(!this.hit(nx,this.py,14)) this.px=Math.max(56,Math.min(W-56,nx));
    if(!this.hit(this.px,ny,14)) this.py=Math.max(276,Math.min(760,ny));
    this.cats.forEach(c=>{
      const v=95*c.d*dt;
      if(c.axis==='x'){c.x+=v; if(c.x<c.min||c.x>c.max)c.d*=-1;}
      else{c.y+=v; if(c.y<c.min||c.y>c.max)c.d*=-1;}
      if(Math.hypot(c.x-this.px,c.y-this.py)<26){
        this.regret+=6; music.sfx('meow'); c.d*=-1;
        this.msg='מיאווווו!!! (החתול הלשין עליך)'; this.msgT=1.3;
      }
    });
    this.regret+=dt*100/42; // ~42s
    if(this.msgT>0)this.msgT-=dt;
    if(Math.hypot(this.px-430,this.py-300)<40) this.win();
    if(this.regret>=100){ this.over=1; music.sfx('crash'); }
  },
  draw(){
    ctx.fillStyle='#161222';ctx.fillRect(0,0,W,H);
    ctx.direction='rtl';txt('הדירה של פנינה · ירושלים · 02 · חושך ובלאגן',W/2,90,15,C.cyan,'center',700);ctx.direction='ltr';
    // regret meter
    rr(60,120,W-120,20,10);ctx.fillStyle='#1a1430';ctx.fill();
    rr(60,120,(W-120)*this.regret/100,20,10);ctx.fillStyle=this.regret>70?C.red:C.mag;ctx.fill();
    ctx.direction='rtl';txt('מד חרטה',W/2,160,12,C.dim);ctx.direction='ltr';
    // apartment floor
    ctx.fillStyle='#221c36';ctx.fillRect(40,260,440,520);
    // mess
    const mess=[['🍕',150,310],['🧦',250,390],['🍕',90,480],['🧺',300,500],['🍔',430,480],['🧦',150,640],['🥡',390,620],['👙',240,720],['🍺',420,730],['🧻',70,580]];
    mess.forEach(([e,x,y])=>txt(e,x,y,24));
    // walls (furniture piles)
    WALLS.forEach(([x,y,w,h])=>{
      ctx.fillStyle='#3a2f5a';rr(x,y,w,h,6);ctx.fill();
      ctx.strokeStyle='#4a3f80';ctx.stroke();
    });
    // bed + pnina
    ctx.fillStyle='#6a2a4a';rr(390,268,84,70,10);ctx.fill();
    ctx.fillStyle='#8a3a5f';rr(390,268,84,22,10);ctx.fill();
    txt('👑',430,258,20);
    drawGirl(430,300,26,{hair:'#2b1d12',skin:'#e8c49d',acc:'💜'});
    ctx.beginPath();ctx.arc(430,318,20,0,Math.PI);ctx.fillStyle='#e8c49d';ctx.fill(); // chins, with love
    // cats
    this.cats.forEach(c=>txt('🐈',c.x,c.y,26));
    drawRenzer(this.px,this.py,15);
    // darkness + flashlight
    ctx.save();
    const g=ctx.createRadialGradient(this.px,this.py,30,this.px,this.py,150);
    g.addColorStop(0,'rgba(10,8,20,0)');g.addColorStop(1,'rgba(10,8,20,0.93)');
    ctx.fillStyle=g;ctx.fillRect(0,180,W,H-180);
    // bed glow
    const g2=ctx.createRadialGradient(430,300,10,430,300,90);
    g2.addColorStop(0,'rgba(255,62,138,0.25)');g2.addColorStop(1,'rgba(255,62,138,0)');
    ctx.fillStyle=g2;ctx.fillRect(330,200,190,200);
    ctx.restore();
    if(this.msgT>0) bubble(W/2,225,300,this.msg);
    ctx.direction='rtl';
    txt('תגיע למיטה לפני שמד החרטה מתמלא. יורדים בגדול. 💪',W/2,810,13,C.dim);
    ctx.direction='ltr';
    if(this.over) bigBanner('התחרטת','ברחת בדקה ה-90. פנינה לא תשכח.','SPACE / טאץ׳ — תהיה גבר, עוד נסיון');
    hud();
  }
 };
}
const MINIGAMES={'03':tlvScene,'09':netanyaScene,'08':bshevaScene,'02':jlmScene};
/* ---------- ENDING ---------- */

  t:0,

    if(endImg&&endImg.complete&&endImg.naturalWidth){

    } else {
      drawRenzer(W/2-40,430,55);drawDog(W/2+70,450,32);
    }
    ctx.direction='rtl';
    const stats=[
      'בחורות שהכיר: 5 · אזורי חיוג: כולם',
      'שילם על דייטים: 0 ₪',
      'אוכל שנאכל בחינם: '+Math.max(S.foodEaten,10)+' מנות',
      'חצי ג׳וינט ← שקית מלאה 🌿',
      'הארנק: עדיין $5.00. לא נגע. אגדה.',
    ];
    if(S.condoms) stats.splice(4,0,'קונדומים מהסופר-פארם: נקנו. מי שילמה? היא. 🎈');
    const li=stats.length-1;
    stats.forEach((s,i)=>txt(s,W/2,565+i*32,15,i===li?C.gold:C.cream,'center',i===li?800:400));
    txt('רנצר — האיש שהמפה של ישראל מחייכת אליו.',W/2,745,14,C.mag,'center',700);
    ctx.direction='ltr';
    pressStart(790,'SPACE / TAP — PLAY AGAIN');
    hud();
  }
};
/* ---------- main loop ---------- */
let last=performance.now();
function frame(now){
  const dt=Math.min(0.033,(now-last)/1000); last=now; S.t+=dt;
  scene.update(dt);
  tapped=false;
  scene.draw();
  music.update();
  requestAnimationFrame(frame);
}
setScene(titleScene);
requestAnimationFrame(frame);
</script>
